<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>SEAMAP</title>
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css">
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#c9b37e;
    --gold-bright:#e8d9ae;
    --ink:#0a1420;
    --text:#e9e4d6;
    --text-dim:rgba(233,228,214,.55);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--ink);font-family:'Jost',sans-serif}
  #map{position:absolute;inset:0}
  #map canvas{outline:none}
  canvas.fx{position:absolute;inset:0;pointer-events:none;z-index:3}

  /* cinematic vignette + right gradient under the panel */
  .veil{position:absolute;inset:0;pointer-events:none;z-index:2}
  .veil::before{content:"";position:absolute;inset:0;
    background:
      linear-gradient(to left, rgba(6,14,24,.88) 0%, rgba(6,14,24,.55) 22%, rgba(6,14,24,0) 46%),
      linear-gradient(to bottom, rgba(6,14,24,.55) 0%, rgba(6,14,24,0) 14%),
      linear-gradient(to top, rgba(6,14,24,.6) 0%, rgba(6,14,24,0) 16%);
  }
  .veil::after{content:"";position:absolute;inset:0;
    box-shadow:inset 0 0 180px 40px rgba(4,10,18,.55)}
  .veil::before, .veil::after{transition:opacity .8s ease}
  /* дневной режим — вуаль почти прозрачная, спутник во всей красе */
  body.day .veil::before{opacity:.45}
  body.day .veil::after{opacity:.35}

  /* ---------- logo ---------- */
  .logo{position:absolute;top:20px;left:34px;z-index:10;pointer-events:none;
    filter:drop-shadow(0 1px 10px rgba(0,0,0,.55))}
  .logo svg{width:140px;height:auto;display:block}
  .logo path{fill:var(--text)}
  .logo .wave{fill:var(--gold)}

  /* ---------- header ---------- */
  header{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:flex-start;
    justify-content:center;padding:26px 30px 0;pointer-events:none}
  .brand{text-align:center}
  .brand h1{font-family:'Cormorant Garamond',serif;font-weight:500;color:var(--text);
    font-size:27px;letter-spacing:.42em;text-indent:.42em;text-shadow:0 1px 14px rgba(0,0,0,.6)}
  .brand .sub{margin-top:6px;font-size:10px;font-weight:300;letter-spacing:.34em;text-indent:.34em;
    color:var(--text-dim);text-transform:uppercase}
  .brand .sub b{color:var(--gold);font-weight:400}
  .locs{margin-top:9px;pointer-events:auto;display:flex;gap:12px;align-items:center;justify-content:center;
    color:rgba(233,228,214,.3);font-size:9px}
  .locs button{background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;font-size:9.5px;
    font-weight:300;letter-spacing:.28em;color:var(--text-dim);text-transform:uppercase;padding:2px 0 3px;
    border-bottom:1px solid transparent;transition:.25s}
  .locs button.on{color:var(--gold-bright);border-bottom-color:rgba(201,179,126,.55)}
  .locs button:hover{color:var(--gold-bright)}
  .search{margin-top:10px;pointer-events:auto;background:none;border:none;outline:none;
    border-bottom:1px solid rgba(201,179,126,.28);padding:3px 6px;width:210px;text-align:center;
    font-family:'Jost',sans-serif;font-size:9.5px;font-weight:300;letter-spacing:.25em;text-transform:uppercase;
    color:var(--text);transition:.25s}
  .search::placeholder{color:rgba(233,228,214,.35)}
  .search:focus{border-bottom-color:var(--gold)}

  /* точка прогноза — центр карты */
  .reticle{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:4;pointer-events:none;
    width:14px;height:14px;border:1px solid rgba(232,217,174,.5);border-radius:50%}
  .reticle::after{content:"";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:3px;height:3px;border-radius:50%;background:rgba(232,217,174,.9)}

  .toolbar{position:absolute;top:24px;right:28px;display:flex;gap:10px;pointer-events:auto}
  .toolbar button{width:34px;height:34px;border-radius:50%;cursor:pointer;
    border:1px solid rgba(201,179,126,.4);background:rgba(8,16,26,.55);backdrop-filter:blur(6px);
    color:var(--gold);display:flex;align-items:center;justify-content:center;transition:.25s}
  .toolbar button:hover{border-color:var(--gold-bright);color:var(--gold-bright);background:rgba(12,22,34,.75)}
  .toolbar svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.4;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- comfort index ---------- */
  .comfort{position:absolute;top:106px;left:34px;z-index:10;display:flex;align-items:center;gap:16px;pointer-events:none}
  .ring{position:relative;width:96px;height:96px;filter:drop-shadow(0 2px 12px rgba(0,0,0,.5))}
  .ring svg{transform:rotate(-90deg)}
  .ring .num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .num span{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:500;color:var(--text);line-height:1}
  .ring .num small{font-size:8px;letter-spacing:.2em;color:var(--text-dim);margin-top:3px;text-transform:uppercase}
  .comfort .info .cap{font-size:9px;letter-spacing:.3em;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
  .stars{color:var(--gold);font-size:12px;letter-spacing:4px;margin-bottom:4px;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .verdict{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:23px;color:var(--gold-bright);
    text-shadow:0 1px 10px rgba(0,0,0,.6)}
  .hint{font-size:10px;font-weight:300;color:var(--text-dim);margin-top:4px;letter-spacing:.06em}

  /* ---------- weather panel ---------- */
  .panel{position:absolute;top:50%;right:36px;transform:translateY(-50%);z-index:10;width:300px;pointer-events:none}
  .row{display:flex;align-items:center;gap:12px;padding:8.5px 0}
  .row + .row{border-top:1px solid rgba(201,179,126,.13)}
  .row .ic{width:20px;height:20px;flex:none;color:var(--gold);opacity:.9;display:flex;align-items:center;justify-content:center}
  .row .ic svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}
  .row .lbl{font-size:10.5px;font-weight:300;letter-spacing:.26em;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
  .row .lead{flex:1;border-bottom:1px dotted rgba(201,179,126,.3);margin:0 2px;transform:translateY(-3px)}
  .row .val{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:500;color:var(--text);white-space:nowrap;
    display:flex;align-items:baseline;gap:5px;text-shadow:0 1px 8px rgba(0,0,0,.7)}
  .row .val small{font-size:10px;font-family:'Jost';font-weight:300;letter-spacing:.12em;color:var(--gold);text-transform:uppercase}
  .tiderow{padding:10px 0 2px;border-top:1px solid rgba(201,179,126,.13)}
  .tiderow svg{display:block;width:100%;height:44px}
  .dirArrow{display:inline-block;width:11px;height:11px;transform-origin:center;transition:transform 1s ease}
  .dirArrow svg{width:11px;height:11px;stroke:var(--gold-bright);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;display:block}

  /* ---------- footer ---------- */
  footer{position:absolute;left:0;right:0;bottom:0;z-index:10;display:flex;justify-content:space-between;align-items:flex-end;
    padding:14px 22px;pointer-events:none}
  footer .legal{font-size:8.5px;font-weight:300;letter-spacing:.14em;color:rgba(233,228,214,.4);text-transform:uppercase;max-width:70%}
  footer .attr{font-size:8.5px;font-weight:300;letter-spacing:.14em;color:rgba(233,228,214,.35);text-transform:uppercase}

  /* boat marker */
  .boat{width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 40% 35%, #fff, #cfe5ef 60%, #9db8c6);
    box-shadow:0 0 0 3px rgba(255,255,255,.12), 0 0 18px 4px rgba(190,220,240,.55);position:relative}
  .boat::after{content:"";position:absolute;inset:-9px;border-radius:50%;border:1px solid rgba(255,255,255,.35);
    animation:pulse 2.6s ease-out infinite}
  @keyframes pulse{0%{transform:scale(.5);opacity:.9}100%{transform:scale(1.6);opacity:0}}
  .wpt{width:7px;height:7px;border-radius:50%;background:rgba(240,236,222,.9);
    box-shadow:0 0 8px 2px rgba(240,236,222,.45);border:1px solid rgba(255,255,255,.6)}

  /* ---------- Пантеон ---------- */
  .pantheon{position:absolute;inset:0;z-index:30;display:none;align-items:center;justify-content:center;
    background:rgba(4,10,18,.78);backdrop-filter:blur(10px)}
  .pantheon.open{display:flex}
  .pan-wrap{display:flex;gap:18px;padding:24px;max-width:1040px;max-height:100%;overflow:auto}
  .pan-card{width:302px;flex:none;background:rgba(8,16,26,.92);border:1px solid rgba(201,179,126,.3);
    cursor:pointer;transition:border-color .3s, transform .3s}
  .pan-card:hover{border-color:var(--gold-bright);transform:translateY(-4px)}
  .pan-card img{width:100%;height:150px;object-fit:cover;display:block;filter:saturate(.85) contrast(1.02)}
  .pan-card .ph{width:100%;height:150px;background:#04080e;display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-size:36px;letter-spacing:.2em;color:rgba(233,228,214,.22)}
  .pan-body{padding:12px 16px 16px}
  .pan-name{font-family:'Cormorant Garamond',serif;font-size:23px;color:var(--gold-bright)}
  .pan-sub{font-size:8px;letter-spacing:.18em;color:var(--text-dim);text-transform:uppercase;margin-top:2px}
  .pan-state{display:flex;align-items:center;gap:8px;margin:10px 0;font-size:9px;letter-spacing:.16em;text-transform:uppercase}
  .pan-state svg{width:15px;height:15px;display:block}
  .lamp-g{color:#8fdd98;text-shadow:0 0 8px rgba(127,217,138,.6)}
  .lamp-y{color:#e8c15a;text-shadow:0 0 8px rgba(232,193,90,.6)}
  .lamp-r{color:#e87a68;text-shadow:0 0 8px rgba(232,106,90,.6)}
  .pr{display:flex;justify-content:space-between;align-items:baseline;gap:8px;padding:3.5px 0;
    border-top:1px solid rgba(201,179,126,.1)}
  .pr span{font-size:8.5px;letter-spacing:.16em;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
  .pr b{font-family:'Cormorant Garamond',serif;font-size:14.5px;font-weight:500;color:var(--text);text-align:right}
  @media (max-width:760px){
    .pan-wrap{flex-direction:column;align-items:center;padding:16px}
    .pan-card{width:min(320px,92vw)}
  }

  /* карточка судна (AIS) */
  .ais-pop .maplibregl-popup-content{background:rgba(8,16,26,.9);backdrop-filter:blur(8px);
    border:1px solid rgba(201,179,126,.35);border-radius:2px;padding:10px 14px;
    box-shadow:0 4px 20px rgba(0,0,0,.5)}
  .ais-pop .maplibregl-popup-tip{display:none}
  .ais-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--gold-bright);letter-spacing:.05em}
  .ais-meta{font-family:'Jost',sans-serif;font-size:9px;font-weight:300;letter-spacing:.2em;
    color:var(--text-dim);text-transform:uppercase;margin-top:3px;margin-bottom:6px}
  .pp{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:2.5px 0;
    border-top:1px solid rgba(201,179,126,.1);min-width:185px}
  .pp span{font-family:'Jost',sans-serif;font-size:8px;font-weight:300;letter-spacing:.14em;
    color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
  .pp b{font-family:'Cormorant Garamond',serif;font-size:13.5px;font-weight:500;color:var(--text);text-align:right}
  .ppn{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:12.5px;line-height:1.35;
    color:rgba(233,228,214,.75);margin-top:7px;max-width:230px}

  .maplibregl-ctrl-attrib{display:none!important}

  /* ---------- mobile ---------- */
  @media (max-width:760px){
    html,body{height:100dvh}
    .veil::before{background:
      linear-gradient(to top, rgba(6,14,24,.92) 0%, rgba(6,14,24,.45) 18%, rgba(6,14,24,0) 36%),
      linear-gradient(to bottom, rgba(6,14,24,.6) 0%, rgba(6,14,24,0) 20%)}
    .logo{left:14px;top:12px}
    .logo svg{width:78px}
    header{padding:20px 14px 0;justify-content:flex-end}
    .brand{text-align:right}
    .brand h1{display:none}
    .brand .sub{font-size:8px;letter-spacing:.22em;text-indent:0;margin-top:0}
    .locs{justify-content:flex-end;margin-top:7px}
    .locs button{font-size:8.5px}
    .toolbar{top:auto;bottom:140px;right:10px;flex-direction:column;gap:8px}
    .toolbar button{width:32px;height:32px}
    .comfort{left:14px;top:62px;gap:10px}
    .ring{width:62px;height:62px}
    .ring svg{width:62px;height:62px}
    .ring .num span{font-size:21px}
    .ring .num small{font-size:6px}
    .comfort .info .cap{font-size:7.5px;letter-spacing:.22em;margin-bottom:3px}
    .stars{font-size:9px;letter-spacing:3px;margin-bottom:2px}
    .verdict{font-size:16px}
    .hint{display:none}
    /* панель погоды — компактная лента внизу с горизонтальной прокруткой */
    .panel{top:auto;bottom:0;left:0;right:0;width:100%;transform:none;display:flex;
      overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;pointer-events:auto;
      padding:16px 6px calc(12px + env(safe-area-inset-bottom));
      background:linear-gradient(to top, rgba(6,14,24,.95) 55%, rgba(6,14,24,.5) 82%, rgba(6,14,24,0) 100%)}
    .panel::-webkit-scrollbar{display:none}
    .row{flex:none;flex-direction:column;align-items:center;gap:5px;padding:0 15px;min-width:84px}
    .row + .row{border-top:none;border-left:1px solid rgba(201,179,126,.16)}
    .row .lead{display:none}
    .row .ic{width:16px;height:16px}
    .row .ic svg{width:15px;height:15px}
    .row .val{font-size:20px}
    .row .lbl{order:4;font-size:7.5px;letter-spacing:.16em}
    footer{bottom:100px;padding:0 12px;justify-content:flex-end}
    footer .legal{display:none}
    footer .attr{font-size:7px}
  }
</style>
</head>
<body>

<div id="map"></div>
<canvas id="swell" class="fx"></canvas>
<canvas id="wind" class="fx"></canvas>
<canvas id="ais" class="fx"></canvas>
<div class="veil"></div>
<div class="reticle"></div>
<div class="pantheon" id="pantheon"><div class="pan-wrap" id="panWrap"></div></div>

<script>
/* ================= CONFIG ================= */
/* Пресеты — только «закладки» с маршрутами. Данные глобальные:
   прогноз берётся для центра карты, сетка ветра — под текущий вьюпорт. */
const LOCATIONS = {
  azur: {
    label:"CÔTE D'AZUR",
    view:{ center:[7.42,43.665], zoom:11.05 },
    route:[[7.4262,43.7345],[7.468,43.705],[7.545,43.664],[7.505,43.596],[7.385,43.586],[7.318,43.652]],
    boat:[7.545,43.664]
  },
  cyprus: {
    label:'CYPRUS',
    view:{ center:[33.72,34.78], zoom:10.6 },
    route:[[33.6404,34.9184],[33.70,34.88],[33.78,34.82],[33.72,34.74],[33.60,34.76],[33.615,34.85]],
    boat:[33.78,34.82]
  }
};
let VIEW = LOCATIONS.azur.view;
const BASE_ZOOM = 11.05, GRID_N = 5;

/* ================= MAP ================= */
// восстанавливаем последнюю позицию карты
let savedView = null;
try{ savedView = JSON.parse(localStorage.getItem('seamap_view_v1') || 'null'); }catch(_){}
const map = new maplibregl.Map({
  container:'map',
  center: savedView?.c || VIEW.center, zoom: savedView?.z ?? VIEW.zoom, bearing:0, pitch:0,
  attributionControl:false, dragRotate:false, pitchWithRotate:false,
  style:{
    version:8,
    sources:{ esri:{ type:'raster', tiles:[
      'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
    ], tileSize:256, maxzoom:19, attribution:'Esri, Maxar, Earthstar Geographics' }},
    layers:[
      { id:'bg', type:'background', paint:{ 'background-color':'#0a1420' }},
      { id:'sat', type:'raster', source:'esri',
        paint:{ 'raster-brightness-max':.92, 'raster-contrast':.06, 'raster-saturation':-.12 }}
    ]
  }
});

function buildRoutes(){
  const feats = Object.values(LOCATIONS).map(L =>
    ({ type:'Feature', geometry:{ type:'LineString', coordinates:L.route }}));
  map.addSource('route', { type:'geojson', data:{ type:'FeatureCollection', features:feats }});
  map.addLayer({ id:'route-line', type:'line', source:'route',
    paint:{ 'line-color':'rgba(240,236,222,.85)', 'line-width':1.4, 'line-dasharray':[.1,2.4] },
    layout:{ 'line-cap':'round' }});
  for (const L of Object.values(LOCATIONS)){
    L.route.forEach(c => {
      if (c[0]===L.boat[0] && c[1]===L.boat[1]) return;
      const el = document.createElement('div'); el.className='wpt';
      new maplibregl.Marker({element:el}).setLngLat(c).addTo(map);
    });
    const boat = document.createElement('div'); boat.className='boat';
    new maplibregl.Marker({element:boat}).setLngLat(L.boat).addTo(map);
  }
}
map.on('load', buildRoutes);

/* геолокация: кнопка-прицел + автоопределение при первом визите */
function goMyPosition(){
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    pos => map.flyTo({ center:[pos.coords.longitude, pos.coords.latitude],
                       zoom:11, duration:2600, essential:true }),
    _ => { const q=document.getElementById('q');
           q.placeholder='ГЕОЛОКАЦИЯ НЕДОСТУПНА'; setTimeout(()=>q.placeholder='Найти место…', 2500); },
    { enableHighAccuracy:false, timeout:8000, maximumAge:600000 }
  );
}
btnGeo.onclick = goMyPosition;
if (!savedView) goMyPosition();   // первый визит — летим к пользователю

/* заголовок и подсветка пресета по близости к центру карты */
function updateTitleByPlace(){
  const c = map.getCenter();
  let best=null, bd=1e9;
  for (const [k,L] of Object.entries(LOCATIONS)){
    const d = Math.hypot(c.lng-L.view.center[0], c.lat-L.view.center[1]);
    if (d<bd){ bd=d; best=k; }
  }
  const isPreset = bd < 1.6;
  const t = isPreset ? 'SEAMAP · '+LOCATIONS[best].label : 'SEAMAP';
  document.getElementById('locTitle').textContent = t;
  document.title = t;                       // заголовок вкладки следует за картой
  document.querySelectorAll('.locs button').forEach(b => b.classList.toggle('on', isPreset && b.dataset.k===best));
}

/* поиск места — Open-Meteo geocoding */
const qEl = document.getElementById('q');
qEl.addEventListener('keydown', async e => {
  if (e.key!=='Enter' || !qEl.value.trim()) return;
  try{
    const g = await fetchJSON('https://geocoding-api.open-meteo.com/v1/search?count=1&language=ru&name='+encodeURIComponent(qEl.value.trim()));
    const p = g.results && g.results[0];
    if (p){ map.flyTo({ center:[p.longitude,p.latitude], zoom:10.5, duration:2600, essential:true }); qEl.value=''; qEl.blur(); }
    else { qEl.value=''; qEl.placeholder='НЕ НАЙДЕНО…'; setTimeout(()=>qEl.placeholder='НАЙТИ МЕСТО…', 2000); }
  }catch(_){}
});

/* перезагрузка данных при перемещении карты */
let lastLoad = { lon:999, lat:999, zoom:0 };
function scheduleReload(force){
  const c = map.getCenter(), z = map.getZoom();
  const b = map.getBounds(), wd = Math.max(b.getEast()-b.getWest(), 0.01);
  if (force || Math.abs(c.lng-lastLoad.lon) > wd*0.18 || Math.abs(c.lat-lastLoad.lat) > wd*0.12
      || Math.abs(z-lastLoad.zoom) > 0.8){
    lastLoad = { lon:c.lng, lat:c.lat, zoom:z };

async function fetchJSON(url){

function hourIdx(hourly, isoNow){

async function loadWeather(){
  const ctr = map.getCenter();
  const base = `latitude=${ctr.lat.toFixed(3)}&longitude=${ctr.lng.toFixed(3)}&timezone=auto`;
  const wURL = `https://api.open-meteo.com/v1/forecast?${base}&wind_speed_unit=kn`+
    `&current=temperature_2m,precipitation,cloud_cover,wind_speed_10m,wind_direction_10m,wind_gusts_10m`+
    `&hourly=visibility,uv_index&forecast_days=1`;
  const mURL = `https://marine-api.open-meteo.com/v1/marine?${base}&cell_selection=sea`+
    `&current=wave_height,wave_direction,wave_period,sea_surface_temperature,ocean_current_velocity,ocean_current_direction`;

  const [wr, mr] = await Promise.allSettled([fetchJSON(wURL), fetchJSON(mURL)]);
  let ok = false;
  if (wr.status==='fulfilled' && wr.value.current){
    const c = wr.value.current, h = wr.value.hourly, i = h ? hourIdx(h, c.time) : 0;
    W.windKn = c.wind_speed_10m; W.gustKn = c.wind_gusts_10m; W.windDir = c.wind_direction_10m;
    W.tAir = c.temperature_2m; W.precip = c.precipitation; W.cloud = c.cloud_cover;
    if (h){ W.visKm = (h.visibility?.[i] ?? 22000)/1000; W.uv = h.uv_index?.[i] ?? W.uv; }
    ok = true;
  }
  if (mr.status==='fulfilled' && mr.value.current && mr.value.current.wave_height!=null){
    const m = mr.value.current;
    W.waveH = m.wave_height; W.waveDir = m.wave_direction; W.wavePer = m.wave_period;
    W.tWater = m.sea_surface_temperature;
    W.curKn = m.ocean_current_velocity!=null ? m.ocean_current_velocity*0.539957 : null; // км/ч → узлы
    W.curDir = m.ocean_current_direction;
  } else {
    // центр карты далеко от моря — морские параметры недоступны
    W.waveH = W.waveDir = W.wavePer = W.tWater = W.curKn = W.curDir = null;

async function loadTides(){
  try{
    const ctr = map.getCenter();
    const r = await fetchJSON(`https://marine-api.open-meteo.com/v1/marine?latitude=${ctr.lat.toFixed(3)}&longitude=${ctr.lng.toFixed(3)}`+
      `&hourly=sea_level_height_msl&forecast_days=3&timezone=auto&cell_selection=sea`);
    const T = r.hourly.time, H = r.hourly.sea_level_height_msl;
    const nowLoc = new Date(Date.now() + (r.utc_offset_seconds||0)*1000).toISOString().slice(0,13);
    let i0 = T.findIndex(t => t.startsWith(nowLoc)); if (i0 < 0) i0 = 0;
    const times = T.slice(i0, i0+36), h = H.slice(i0, i0+36);
    if (h[0] == null) throw 0;
    // ближайшая полная (ПВ) или малая (МВ) вода
    let nextLabel = null, nextTime = null;
    for (let k=1; k<h.length-1; k++){
      if (h[k] == null) continue;
      const isMax = h[k] >= h[k-1] && h[k] > h[k+1];
      const isMin = h[k] <= h[k-1] && h[k] < h[k+1];
      if (isMax || isMin){ nextLabel = isMax ? 'ПВ' : 'МВ'; nextTime = times[k].slice(11,16); break; }
    }
    W.tide = { h, times, nextLabel, nextTime };
  }catch(_){ W.tide = null; }
}

async function loadWindField(){
  const vb = viewBounds(0.15);
  const s = Math.max(-85, vb.s), n = Math.min(85, vb.n);
  const w = Math.max(-179.9, vb.w), e = Math.min(179.9, vb.e);
  const lats=[], lons=[];
  for (let j=0;j<GRID_N;j++) lats.push(s + (n-s)*j/(GRID_N-1));
  for (let i=0;i<GRID_N;i++) lons.push(w + (e-w)*i/(GRID_N-1));
  const la=[], lo=[];
  for (const lat of lats) for (const lon of lons){ la.push(lat.toFixed(3)); lo.push(lon.toFixed(3)); }
  try{
    const res = await fetchJSON(`https://api.open-meteo.com/v1/forecast?latitude=${la.join(',')}`+
      `&longitude=${lo.join(',')}&current=wind_speed_10m,wind_direction_10m&wind_speed_unit=ms`);
    const arr = Array.isArray(res) ? res : [res];
    const u=[], v=[];
    for (let j=0;j<GRID_N;j++){ u.push([]); v.push([]);
      for (let i=0;i<GRID_N;i++){
        const c = arr[j*GRID_N+i]?.current;
        const sp = c?.wind_speed_10m ?? 5, dir = (c?.wind_direction_10m ?? W.windDir)*Math.PI/180;
        u[j].push(-sp*Math.sin(dir)); v[j].push(-sp*Math.cos(dir));
      }}
    windField = {lats,lons,u,v};
  }catch(e){ windField = null; } // fallback → синтетика от W.windDir
}

// выборка ветра (м/с) в точке — билинейная, либо синтетика
function sampleWind(lon,lat){
  if (windField){
    const {lats,lons,u,v} = windField;
    const fx = Math.min(Math.max((lon-lons[0])/(lons[GRID_N-1]-lons[0]),0),.999)*(GRID_N-1);
    const fy = Math.min(Math.max((lat-lats[0])/(lats[GRID_N-1]-lats[0]),0),.999)*(GRID_N-1);
    const i=fx|0, j=fy|0, ax=fx-i, ay=fy-j;
    const bl=(g)=> g[j][i]*(1-ax)*(1-ay)+g[j][i+1]*ax*(1-ay)+g[j+1][i]*(1-ax)*ay+g[j+1][i+1]*ax*ay;
    return [bl(u), bl(v)];
  }
  const sp = Math.max(W.windKn*0.5144, 2.5), d = W.windDir*Math.PI/180;
  const wob = Math.sin(lon*40)*Math.cos(lat*40)*0.35; // лёгкая неоднородность
  return [-sp*Math.sin(d)*(1+wob), -sp*Math.cos(d)*(1+wob)];
}

/* ================= COMFORT ================= */
function comfort(){
  let s = 100
    - (W.windKn||0)*1.15
    - Math.max(0,(W.gustKn||0)-(W.windKn||0))*0.7
    - (W.waveH||0)*16
    - (W.precip||0)*9
    - (W.cloud||0)*0.06
    - Math.max(0, 12-(W.visKm||22)*0.539957)*1.2;
  if ((W.wavePer||9) < 3.5 && (W.waveH||0) > 0.3) s -= 6;
  s = Math.round(Math.min(100, Math.max(5, s)));
  const verdict = s>=85?'Превосходно':s>=70?'Отлично':s>=55?'Хорошо':s>=40?'Умеренно':'Непростые условия';
  const hint = s>=85?'Почти штиль, комфортная волна':s>=70?'Лёгкий бриз, приятная прогулка':
               s>=55?'Свежий ветер, умеренная волна':s>=40?'Заметная качка вероятна':'Выход стоит отложить';
  return {s, verdict, stars:Math.min(5,Math.max(1,Math.round(s/20))), hint};
}

/* глобальная маска суши: world-atlas land-50m (TopoJSON), декодируем сами */
let landRings = null; // [{bbox:[w,s,e,n], pts:[[lon,lat],...]}]
(async function loadLandMask(){
  try{
    const topo = await fetch('https://unpkg.com/world-atlas@2.0.2/land-50m.json').then(r=>r.json());
    const sc = topo.transform.scale, tr = topo.transform.translate;
    const arcs = topo.arcs.map(a => { let x=0,y=0;
      return a.map(([dx,dy]) => { x+=dx; y+=dy; return [x*sc[0]+tr[0], y*sc[1]+tr[1]]; }); });
    const rings = [];
    const geoms = topo.objects.land.geometries ?? [topo.objects.land];
    for (const g of geoms){
      const polys = g.type==='Polygon' ? [g.arcs] : g.arcs;
      for (const poly of polys) for (const ringArcs of poly){
        let ring = [];
        for (const ai of ringArcs){
          const a = ai>=0 ? arcs[ai] : arcs[~ai].slice().reverse();
          ring = ring.concat(a);
        }
        let w=180,s=90,e=-180,n=-90;
        for (const p of ring){ if(p[0]<w)w=p[0]; if(p[0]>e)e=p[0]; if(p[1]<s)s=p[1]; if(p[1]>n)n=p[1]; }
        rings.push({ bbox:[w,s,e,n], pts:ring });
      }
    }
    landRings = rings;
  }catch(_){ landRings = null; }
})();
function inSea(lon,lat){
  if (!landRings) return false;          // маска ещё грузится — волны подождут
  let inside = false;
  for (const r of landRings){
    const [w,s,e,n] = r.bbox;
    if (lon<w || lon>e || lat<s || lat>n) continue;
    const p = r.pts;
    for (let i=0,j=p.length-1;i<p.length;j=i++){
      if ((p[i][1]>lat)!==(p[j][1]>lat) &&
          lon < (p[j][0]-p[i][0])*(lat-p[i][1])/(p[j][1]-p[i][1])+p[i][0]) inside=!inside;
    }
  }
  return !inside;
}

  return null;
}

function aisBounds(){
  const b = viewBounds(0.25);
  const boxes = [[[Math.max(-85,b.s), Math.max(-180,b.w)], [Math.min(85,b.n), Math.min(180,b.e)]]];
  // рамки вокруг последних позиций яхт Пантеона — трекинг через тот же сокет
  try{
    for (const y of PANTHEON){
      const p = panData[y.key];
      if (y.name && p && p.lat!=null)
        boxes.push([[Math.max(-85,p.lat-0.5), Math.max(-180,p.lon-0.5)],
                    [Math.min(85,p.lat+0.5),  Math.min(180,p.lon+0.5)]]);
    }
  }catch(_){}
  return boxes;
}
function aisSubscribe(){
  if (!aisWS || aisWS.readyState !== 1) return;
  aisWS.send(JSON.stringify({ APIKey:AIS_KEY, BoundingBoxes:aisBounds(),
    FilterMessageTypes:['PositionReport','ShipStaticData'] }));
}
function aisConnect(){
  if (aisWS){ try{ aisWS.onclose=null; aisWS.close(); }catch(_){} }
  try{ aisWS = new WebSocket('wss://stream.aisstream.io/v0/stream'); }catch(_){ return; }
  aisWS.binaryType = 'arraybuffer';   // aisstream шлёт бинарные кадры
  aisWS.onopen = () => { aisRetry = 0; aisSubscribe(); };
  aisWS.onmessage = ev => {
    try{
      const m = JSON.parse(typeof ev.data === 'string' ? ev.data : new TextDecoder().decode(ev.data));
      const mdp = m.MetaData || {};
      let yv = null; try{ yv = yachtByMMSI(mdp.MMSI); }catch(_){}
      if (yv){ try{ panUpdate(yv, m, mdp); }catch(_){} return; }   // яхта Пантеона
      if (m.MessageType !== 'PositionReport') return;
      const p = m.Message.PositionReport, md = m.MetaData || {};
      const id = md.MMSI ?? p.UserID;
      const s = ships.get(id) || {};
      s.mmsi = id; s.nav = p.NavigationalStatus;
      s.lon = p.Longitude; s.lat = p.Latitude;
      s.cog = (p.Cog!=null && p.Cog>=0 && p.Cog<360) ? p.Cog : (s.cog ?? 0);
      s.sog = (p.Sog!=null && p.Sog>=0 && p.Sog<102) ? p.Sog : 0;
      s.name = (md.ShipName || s.name || '').trim();
      s.ts = Date.now(); s.dr = s.ts;
      ships.set(id, s);
    }catch(_){}
  };
  aisWS.onclose = () => {
    if (showShips && aisRetry < 10){
      aisRetry++;
      setTimeout(aisConnect, Math.min(60000, 4000*aisRetry));   // мягкий бэк-офф
    }
  };
}
function aisRefresh(){
  // суда за пределами нового окна убираем сразу
  const b = viewBounds(0.35);
  for (const [k,s] of ships)
    if (s.lon<b.w || s.lon>b.e || s.lat<b.s || s.lat>b.n) ships.delete(k);
  if (aisWS && aisWS.readyState===1) aisSubscribe();
  else { aisRetry = 0; aisConnect(); }
}

map.on('click', e => {
  if (aisPopup){ aisPopup.remove(); aisPopup = null; }
  if (!showShips && !showWrecks) return;
  let best=null, bd=14;
  if (showShips) for (const s of ships.values()){
    const pt = map.project([s.lon,s.lat]);
    const d = Math.hypot(pt.x-e.point.x, pt.y-e.point.y);
    if (d<bd){ bd=d; best=s; }
  }
  if (showWrecks) for (const wq of wrecks.values()){
    const pt = map.project([wq.lon,wq.lat]);
    const d = Math.hypot(pt.x-e.point.x, pt.y-e.point.y);
    if (d<bd){ bd=d; best={ wreck:wq, o:wq }; }
  }
  for (const y of PANTHEON){                       // яхты Пантеона тоже кликабельны
    const p = panData[y.key]; if (!y.name || !p || p.lon==null) continue;
    const pt = map.project([p.lon,p.lat]);
    const d = Math.hypot(pt.x-e.point.x, pt.y-e.point.y);
    if (d<bd){ bd=d; best={ pan:y, o:p }; }
  }
  if (!best) return;
  const o = best.o || best, esc = t => String(t).replace(/</g,'&lt;');
  const pos = o.lat!=null ? toDMS(o.lat,'N','S')+' '+toDMS(o.lon,'E','W') : null;
  const row = (l,v) => (v==null || v==='') ? '' : `<div class="pp"><span>${l}</span><b>${v}</b></div>`;
  let html;
  if (best.pan){
    const st = panState(o);
    html = `<div class="ais-name">${best.pan.name}</div>
      <div class="ais-meta">IMO ${best.pan.imo} · MMSI ${o.mmsiActive||''}</div>`
      + row('Связь', st.label)
      + row('Скорость', o.sog!=null ? fmt(o.sog)+' уз' : null)
      + row('Курс', o.cog!=null ? Math.round(o.cog)+'°' : null)
      + row('Статус', NAVTXT[o.nav])
      + row('Назначение', o.dest)
      + row('ETA', o.eta ? String(o.eta.Day).padStart(2,'0')+'.'+String(o.eta.Month).padStart(2,'0')+' '+String(o.eta.Hour||0).padStart(2,'0')+':'+String(o.eta.Minute||0).padStart(2,'0') : null)
      + row('Осадка', o.draught ? fmt(o.draught)+' м' : null)

      + row('Позывной', o.callsign)
      + row('Флаг', o.mmsiActive ? midFlag(o.mmsiActive) : null)
      + row('Позиция', pos)
      + row('Обновлено', agoText(o.ts) + (o.fb ? ' · архив' : ''));
  } else if (best.wreck){
    const q = best.wreck.p, k = best.wreck.kind;
    const val = v => (v==null || v==='' || v==='n/a' || v==='0' || v===0 || v==='-1' || v==='None reported')
      ? null : String(v).replace(/</g,'&lt;');
    html = `<div class="ais-name">${val(q.name) || 'Неизвестный объект'}</div>
      <div class="ais-meta">Затонувшее судно · ${k==='heritage' ? (val(q.source_inf)||'EMODnet Heritage') : 'UKHO / EMODnet'}</div>`;
    let story;
    if (k === 'heritage'){
      html += row('Тип', val(q.obj_type)) + row('Датировка', val(q.dating))
        + row('Год гибели', val(q.sink_yr))
        + row('Глубина', val(q.depth_info) && val(q.depth_info)+' м')
        + row('Тоннаж', val(q.est_tonnag)) + row('Длина', val(q.object_length) && q.object_length+' м')
        + row('Охрана', val(q.statutory)) + row('Страна', val(q.country)) + row('Период', val(q.period));
      story = val(q.sink_context) || val(q.obj_desc);
    } else {
      html += row('Тип', val(q.type)) + row('Категория', val(q.wreck_cate))
        + row('Дата гибели', val(q.date_sunk)) + row('Флаг', val(q.flag))
        + row('Глубина над объектом', val(q.depth) && q.depth+' м')
        + row('Глубина места', val(q.water_dept) && q.water_dept+' м')
        + row('Тоннаж', val(q.tonnage)) + row('Длина', val(q.length) && q.length+' м')
        + row('Состояние', val(q.status)) + row('Обнаружен', val(q.last_detec))
        + row('Груз', val(q.cargo));
      story = val(q.circumstan);
    }
    if (story) html += `<div class="ppn">${story.slice(0,220)}${story.length>220?'…':''}</div>`;
    html += row('Позиция', pos);
  } else {
    html = `<div class="ais-name">${esc(o.name||'БЕЗ ИМЕНИ')}</div>
      <div class="ais-meta">${o.mmsi ? 'MMSI '+o.mmsi : ''}</div>`
      + row('Скорость', o.sog!=null ? fmt(o.sog)+' уз' : null)

      + row('Обновлено', agoText(o.ts));
  }
  aisPopup = new maplibregl.Popup({ className:'ais-pop', closeButton:false, offset:12, maxWidth:'270px' })
    .setLngLat([o.lon,o.lat]).setHTML(html).addTo(map);
});

  else {

/* Пантеон слушает тот же единственный сокет aisstream (см. aisWS.onmessage):
   отдельное соединение упиралось в лимит одновременных подключений. */
function yachtByMMSI(m){ m = String(m); return PANTHEON.find(y => y.mmsi && y.mmsi.includes(m)); }
function panUpdate(y, m, md){
  const p = panData[y.key] || {};
  p.mmsiActive = String(md.MMSI);
  p.live = true; p.fb = false;          // пришли живые данные — архив больше не нужен
  if (m.MessageType === 'PositionReport'){
    const r = m.Message.PositionReport;
    p.lon = r.Longitude; p.lat = r.Latitude;
    if (r.Sog!=null && r.Sog<102) p.sog = r.Sog;
    if (r.Cog!=null && r.Cog<360) p.cog = r.Cog;
    if (r.TrueHeading!=null && r.TrueHeading<360) p.heading = r.TrueHeading;
    p.nav = r.NavigationalStatus;
    p.ts = Date.now();
  } else if (m.MessageType === 'ShipStaticData'){
    const s = m.Message.ShipStaticData;
    if ((s.CallSign||'').trim()) p.callsign = s.CallSign.trim();
    if ((s.Destination||'').trim()) p.dest = s.Destination.trim();
    if (s.MaximumStaticDraught) p.draught = s.MaximumStaticDraught;
    if (s.Dimension){
      const L=(s.Dimension.A||0)+(s.Dimension.B||0), B=(s.Dimension.C||0)+(s.Dimension.D||0);
      if (L) p.len = L; if (B) p.beam = B;
    }
    if (s.Eta && s.Eta.Month) p.eta = s.Eta;
  }
  panData[y.key] = p;
  try{ localStorage.setItem('seamap_pan_v1', JSON.stringify(panData)); }catch(_){}
}

const WIFI = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"><path d="M2.5 9.5c5.5-5 13.5-5 19 0M5.5 12.7c4-3.6 9-3.6 13 0M8.7 15.8c2-1.8 4.6-1.8 6.6 0"/><circle cx="12" cy="19" r="1.4" fill="currentColor" stroke="none"/></svg>';
const NAVTXT = {0:'В пути',1:'На якоре',2:'Не управляется',3:'Ограничен в манёвре',5:'У причала',8:'Под парусом'};
function midFlag(m){ return ({'518':'Острова Кука','310':'Бермуды'})[String(m).slice(0,3)] || '—'; }
function panState(p){
  if (!p || !p.ts) return { cls:'r', label:'НЕТ ДАННЫХ' };
  if (p.fb) return { cls:'y', label:'АРХИВНЫЕ ДАННЫЕ' };
  const days = (Date.now()-p.ts)/86400000;
  if (days < 1) return { cls:'g', label:'НА СВЯЗИ' };
  const d = Math.floor(days);
  return { cls: d>10 ? 'r' : 'y', label:`${d} ДН. НЕ НА СВЯЗИ` };
}
function agoText(ts){
  if (!ts) return '—';
  const m = (Date.now()-ts)/60000;
  if (m<1) return 'только что';
  if (m<60) return Math.round(m)+' мин назад';
  if (m<1440) return Math.round(m/60)+' ч назад';
  return Math.floor(m/1440)+' дн назад';
}

/* ================= ЗАТОНУВШИЕ СУДА — EMODnet / UKHO ================= */
let showWrecks = false, wrecks = new Map(), wrecksTimer = null;
async function loadWrecks(){
  if (!showWrecks || map.getZoom() < 6.5) return;
  const b = viewBounds(0.1);
  const bbox = `${Math.max(-85,b.s).toFixed(3)},${Math.max(-180,b.w).toFixed(3)},`+
               `${Math.min(85,b.n).toFixed(3)},${Math.min(180,b.e).toFixed(3)},urn:ogc:def:crs:EPSG::4326`;
  const mk = l => `https://ows.emodnet-humanactivities.eu/wfs?service=WFS&version=2.0.0&request=GetFeature`+
                  `&typeNames=${l}&outputFormat=application/json&count=400&bbox=${bbox}`;
  const [h,w] = await Promise.allSettled([
    fetchJSON(mk('emodnet:heritageshipwrecks')),
    fetchJSON(mk('emodnet:wwshipwrecks'))
  ]);
  const add = (res, kind) => {
    if (res.status!=='fulfilled' || !res.value.features) return;
    for (const f of res.value.features){
      if (!f.geometry || f.geometry.type!=='Point') continue;
      const [lon,lat] = f.geometry.coordinates;
      wrecks.set(kind+':'+(f.id || lon+','+lat), { lon, lat, kind, p:f.properties||{} });
    }
  };
  add(h,'heritage'); add(w,'ww');
  if (wrecks.size > 1200){                    // не даём разрастись
    const bb = viewBounds(0.6);
    for (const [k,v] of wrecks)
      if (v.lon<bb.w||v.lon>bb.e||v.lat<bb.s||v.lat>bb.n) wrecks.delete(k);
  }
}
btnWrecks.onclick = () => {
  showWrecks = !showWrecks;
  dim(btnWrecks, showWrecks);
  if (showWrecks) loadWrecks();
};

/* ================= ANIMATION LOOP ================= */
map.on('move', () => { wctx.clearRect(0,0,windC.width,windC.height); particles.forEach(p=>{p.px=null;}); });

function frame(){
  fxSkip = !fxSkip;                 // 30 fps: вдвое меньше работы GPU, глазу не заметно
  if (fxSkip){ requestAnimationFrame(frame); return; }
  const elW = windC.clientWidth, elH = windC.clientHeight;
  // компенсация зума: держим экранную скорость частиц постоянной
  const zScale = Math.pow(2, BASE_ZOOM - map.getZoom());

  /* --- wind --- */
  if (showWind){
    wctx.globalCompositeOperation='destination-in';
    wctx.fillStyle='rgba(0,0,0,0.93)';
    wctx.fillRect(0,0,elW,elH);
    wctx.globalCompositeOperation='source-over';

    const need = targetCount();
    while (particles.length < need) particles.push(spawnParticle());
    if (particles.length > need) particles.length = need;

    wctx.lineWidth = 1.15;
    for (const p of particles){
      const [u,v] = sampleWind(p.lon,p.lat);
      const sp = Math.hypot(u,v);
      p.lon += u*DEG_PER_M*WIND_SPEED*zScale/Math.max(Math.cos(p.lat*Math.PI/180),.3);
      p.lat += v*DEG_PER_M*WIND_SPEED*zScale;
      p.life++;
      const pt = map.project([p.lon,p.lat]);
      if (p.px!=null && Math.abs(pt.x-p.px)<40 && Math.abs(pt.y-p.py)<40){
        const a = Math.min(1, p.life/12) * Math.min(1,(p.ttl-p.life)/24);
        const bright = Math.min(1, sp/9);
        wctx.strokeStyle = `rgba(${226+Math.round(bright*22)},${216+Math.round(bright*14)},${182+Math.round(bright*30)},${(0.32+bright*0.35)*a})`;
        wctx.beginPath(); wctx.moveTo(p.px,p.py); wctx.lineTo(pt.x,pt.y); wctx.stroke();
      }
      p.px=pt.x; p.py=pt.y;
      if (p.life>p.ttl || pt.x<-60||pt.x>elW+60||pt.y<-60||pt.y>elH+60) Object.assign(p, spawnParticle());
    }
  } else wctx.clearRect(0,0,elW,elH);

  /* --- swell --- */
  sctx.clearRect(0,0,elW,elH);
  if (showSwell){
    const need = 36;
    while (crests.length<need){ const c=spawnCrest(); if(!c) break; crests.push(c); }
    const toDir = ((W.waveDir??210)+180)*Math.PI/180;      // куда идут волны
    const dx=Math.sin(toDir), dy=-Math.cos(toDir);          // экранный вектор
    const drift = (0.008 + (W.waveH||.3)*0.012);            // deg-скорость мала — двигаем в градусах
    sctx.lineWidth = 1.1;
    for (const c of crests){
      c.lon += dx*drift*0.0032*zScale; c.lat -= dy*drift*0.0032*zScale; c.life++;
      const pt = map.project([c.lon,c.lat]);
      const a = Math.sin(Math.PI*Math.min(c.life/c.ttl,1)) * 0.16;
      if (a>0.005 && pt.x>-80 && pt.x<elW+80 && pt.y>-80 && pt.y<elH+80){
        // дуга-гребень перпендикулярно направлению волны, выгнута вперёд
        const nx=-dy, ny=dx, L=c.len, B=L*c.bow;
        sctx.strokeStyle = `rgba(205,228,240,${a})`;
        sctx.beginPath();
        sctx.moveTo(pt.x-nx*L, pt.y-ny*L);
        sctx.quadraticCurveTo(pt.x+dx*B, pt.y+dy*B, pt.x+nx*L, pt.y+ny*L);
        sctx.stroke();
      }
      if (c.life>c.ttl || !inSea(c.lon,c.lat) ||
          pt.x<-600 || pt.x>elW+600 || pt.y<-600 || pt.y>elH+600)
        { const nc=spawnCrest(); if(nc) Object.assign(c,nc); else c.life=0; }
    }
  }

  /* --- суда (AIS) --- */
  actx.clearRect(0,0,elW,elH);
  if (showShips){
    const now = Date.now(), z = map.getZoom();
    for (const s of ships.values()){
      // счисление: между AIS-обновлениями судно плавно движется по курсу
      // (только для свежих — судно из кэша с места не трогаем)
      if (s.sog > 0.2 && now - s.ts < 5*60*1000){
        const dt = (now - (s.dr||now))/1000;
        const v = s.sog*0.514444*dt*DEG_PER_M, th = s.cog*Math.PI/180;
        s.lon += v*Math.sin(th)/Math.max(Math.cos(s.lat*Math.PI/180),.3);
        s.lat += v*Math.cos(th);
      }
      s.dr = now;
      const pt = map.project([s.lon,s.lat]);
      if (pt.x<-30||pt.x>elW+30||pt.y<-30||pt.y>elH+30) continue;
      const age = Math.min(1,(now-s.ts)/(30*60*1000));   // затухание за 30 минут
      const a = 0.95 - age*0.6;                          // старые — призраки, но видны
      actx.save(); actx.translate(pt.x,pt.y); actx.rotate((s.cog||0)*Math.PI/180);
      if (s.sog > 0.2){
        // мягкое свечение — увеличенный полупрозрачный силуэт (дешевле shadowBlur)
        actx.beginPath();
        actx.moveTo(0,-9); actx.lineTo(5.2,7); actx.lineTo(0,4); actx.lineTo(-5.2,7); actx.closePath();
        actx.fillStyle = `rgba(232,217,174,${a*.18})`; actx.fill();
        actx.beginPath();
        actx.moveTo(0,-6.5); actx.lineTo(3.6,5); actx.lineTo(0,2.8); actx.lineTo(-3.6,5); actx.closePath();
        actx.fillStyle = `rgba(240,232,208,${a})`; actx.fill();
        actx.strokeStyle = `rgba(201,179,126,${a})`; actx.lineWidth = .8; actx.stroke();
      } else {
        actx.beginPath(); actx.arc(0,0,4.4,0,7);
        actx.fillStyle = `rgba(232,217,174,${a*.16})`; actx.fill();
        actx.beginPath(); actx.arc(0,0,2.6,0,7);
        actx.fillStyle = `rgba(222,215,192,${a*.85})`; actx.fill();
      }
      actx.restore();
      if (z>=12.2 && s.name){
        actx.font = '300 8px Jost, sans-serif';
        actx.fillStyle = `rgba(233,228,214,${0.55*a})`;
        actx.fillText(s.name, pt.x+8, pt.y+3);
      }
    }
    // яхты Пантеона — золотой ромб и имя на любом зуме
    for (const y of PANTHEON){
      const p = panData[y.key]; if (!y.name || !p || p.lon==null) continue;
      const pt = map.project([p.lon,p.lat]);
      if (pt.x<-60||pt.x>elW+60||pt.y<-60||pt.y>elH+60) continue;
      actx.save(); actx.translate(pt.x,pt.y); actx.rotate(((p.heading ?? p.cog ?? 0))*Math.PI/180);
      actx.beginPath();
      actx.moveTo(0,-12); actx.lineTo(7.2,0); actx.lineTo(0,12); actx.lineTo(-7.2,0); actx.closePath();
      actx.fillStyle = 'rgba(232,217,174,.22)'; actx.fill();   // ореол
      actx.beginPath();
      actx.moveTo(0,-8); actx.lineTo(4.8,0); actx.lineTo(0,8); actx.lineTo(-4.8,0); actx.closePath();
      actx.fillStyle = 'rgba(236,222,182,.96)'; actx.fill();
      actx.strokeStyle = 'rgba(120,98,50,.9)'; actx.lineWidth = 1; actx.stroke();
      actx.restore();
      actx.font = '400 9.5px Jost, sans-serif';
      actx.fillStyle = 'rgba(236,222,182,.9)';
      actx.fillText(y.name.toUpperCase(), pt.x+11, pt.y+3.5);
    }
  }

  /* --- затонувшие суда (картографический символ рэка) --- */
  if (showWrecks){
    actx.strokeStyle = 'rgba(224,132,100,.85)';
    actx.lineWidth = 1.2; actx.lineCap = 'round';
    for (const wq of wrecks.values()){
      const pt = map.project([wq.lon,wq.lat]);
      if (pt.x<-20||pt.x>elW+20||pt.y<-20||pt.y>elH+20) continue;
      actx.save(); actx.translate(pt.x,pt.y);
      actx.beginPath();
      actx.moveTo(-5,0); actx.lineTo(5,0);                        // ватерлиния
      actx.moveTo(-3.2,0); actx.quadraticCurveTo(0,4.4,3.2,0);    // корпус
      actx.moveTo(-1.6,0); actx.lineTo(-1.6,-3);
      actx.moveTo(0,0);    actx.lineTo(0,-4);
      actx.moveTo(1.6,0);  actx.lineTo(1.6,-3);
      actx.stroke();
      actx.restore();
    }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ================= THEME (день / ночь) ================= */
const SUN_SVG = '<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"/><path d="M12 3v2.4M12 18.6V21M3 12h2.4M18.6 12H21M5.6 5.6l1.7 1.7M16.7 16.7l1.7 1.7M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7"/></svg>';
const MOON_SVG = '<svg viewBox="0 0 24 24"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';
let THEME = 'night', themeManual = false;
function setTheme(mode){
  THEME = mode;
  document.body.classList.toggle('day', mode==='day');
  const p = mode==='day'
    ? { b:1.0,  c:0,    s:-0.04 }   // день: спутник без затемнения
    : { b:0.92, c:0.06, s:-0.12 };  // ночь: приглушённый кинематографичный
  const apply = () => {
    map.setPaintProperty('sat','raster-brightness-max', p.b);
    map.setPaintProperty('sat','raster-contrast', p.c);
    map.setPaintProperty('sat','raster-saturation', p.s);
  };
  map.isStyleLoaded() ? apply() : map.once('load', apply);
  btnTheme.innerHTML = mode==='day' ? SUN_SVG : MOON_SVG;
}
function autoTheme(){
  if (themeManual) return;
  const h = new Date().getHours();
  setTheme(h>=7 && h<19 ? 'day' : 'night');
}
btnTheme.onclick = () => { themeManual = true; setTheme(THEME==='day' ? 'night' : 'day'); };
autoTheme();
setInterval(autoTheme, 60*1000);   // авто-переключение по часам устройства

/* ================= TOOLBAR ================= */
const dim = (btn,on) => btn.style.opacity = on ? 1 : .38;
btnWind.onclick  = () => { showWind=!showWind;  dim(btnWind, showWind); };
btnSwell.onclick = () => { showSwell=!showSwell; dim(btnSwell, showSwell); };
btnShips.onclick = () => { showShips=!showShips; dim(btnShips, showShips);
  if (showShips && (!aisWS || aisWS.readyState>1)){ aisRetry=0; aisConnect(); } };
btnFull.onclick  = () => document.fullscreenElement ? document.exitFullscreen() : document.documentElement.requestFullscreen();
btnRefresh.onclick = () => refresh(true);

/* ================= BOOT ================= */
async function refresh(spin){
  if (spin){ btnRefresh.style.transform='rotate(360deg)'; btnRefresh.style.transition='transform .8s';
    setTimeout(()=>{btnRefresh.style.transform='';btnRefresh.style.transition='';},850); }
  await Promise.allSettled([loadWeather(), loadWindField(), loadTides()]);
  render();
}
render();                                // сразу показываем демо-значения
updateTitleByPlace();
scheduleReload(true);                    // и тут же тянем живые данные
setInterval(() => refresh(), 10*60*1000);   // автообновление каждые 10 минут
</script>
